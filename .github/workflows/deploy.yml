name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LaTeX
        run: sudo apt-get update && sudo apt-get install -y texlive-latex-base texlive-lang-portuguese

      - name: Create output directory
        run: mkdir -p site/public/pdf

      - name: Compile LaTeX files
        run: |
          for f in latex/*.tex; do
            echo "Compilando $f..."
            pdflatex -output-directory=site/public/pdf "$f"
          done

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
        working-directory: site

      - run: npm run build
        working-directory: site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

permissions:
  contents: read
  pages: write
  id-token: write
