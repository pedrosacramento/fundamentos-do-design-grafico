name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install LaTeX
        run: sudo apt-get update && sudo apt-get install -y texlive-latex-base texlive-latex-extra texlive-lang-portuguese

      - name: Compile LaTeX files
        run: |
          set -e
          mkdir -p site/public/pdf
          for f in latex/*.tex; do
            echo "Compilando $f..."
            pdflatex -output-directory=site/public/pdf "$f"
            pdflatex -output-directory=site/public/pdf "$f"
          done
          rm -f site/public/pdf/*.aux site/public/pdf/*.log site/public/pdf/*.out

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
        working-directory: site

      - run: npm run build
        working-directory: site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

permissions:
  contents: read
  pages: write
  id-token: write
